services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: schemaflow-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=True
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - schemaflow-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: schemaflow-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - schemaflow-network

networks:
  schemaflow-network:
    driver: bridge
